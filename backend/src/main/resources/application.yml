
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: gradebook
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  
  datasource:
    url: jdbc:sqlite:./example_db.sqlite
    driver-class-name: org.sqlite.JDBC
  
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: gradebook_jwt_secret_key_for_university_score_management_system_2024
  expiration: 86400000

logging:
  level:
    com.example.gradebook: DEBUG
    org.hibernate.SQL: DEBUG
